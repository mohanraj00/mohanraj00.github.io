<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Three questions about what life needs, tested one by one</title>
  <desc id="d">Three rows, each pairing an Earth-shaped assumption with what actually happens on Enceladus. Row one: assumed necessary, a magnetic field and atmosphere; what happens instead, an ice shell tens of kilometres thick shields the ocean, so neither is needed, marked reframed. Row two: assumed necessary, sunlight; what happens instead, chemosynthesis at hydrothermal vents powers complex life in total darkness, marked reframed. Row three: assumed necessary, enough time for chemistry to become biology; what happens instead, estimates for the age of Enceladus's ocean range from about one hundred million to over a billion years and are still disputed in the peer reviewed literature, marked open question. A closing line reads: two questions get answered by changing the mechanism, the third depends on a number nobody agrees on yet.</desc>

  <defs>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f6fa"/>
    </linearGradient>
    <linearGradient id="paneG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f7f9fc"/>
    </linearGradient>
    <linearGradient id="okChipG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4fa"/><stop offset="1" stop-color="#e3edf6"/>
    </linearGradient>
    <linearGradient id="openChipG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf1ec"/><stop offset="1" stop-color="#fbe6dd"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1a2740" flood-opacity="0.10"/>
    </filter>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#20344f" flood-opacity="0.13"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#93a3b5"/></marker>
  </defs>

  <rect x="10" y="10" width="860" height="600" rx="20" fill="url(#cardG)" stroke="#e4e9f1" stroke-width="1.5" filter="url(#soft)"/>

  <text x="440" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#2f6f9f" letter-spacing="1.5">ASSUMED NECESSARY, BECAUSE THAT IS HOW EARTH WORKS</text>

  <!-- Row 1 -->
  <g filter="url(#lift)"><rect x="46" y="66" width="300" height="104" rx="14" fill="url(#paneG)" stroke="#dde3ec" stroke-width="1.5"/></g>
  <text x="196" y="104" text-anchor="middle" font-size="14.5" font-weight="700" fill="#12203a">A magnetic field</text>
  <text x="196" y="126" text-anchor="middle" font-size="14.5" font-weight="700" fill="#12203a">and atmosphere</text>
  <text x="196" y="150" text-anchor="middle" font-size="11.5" fill="#5a6880">to shield the surface</text>

  <path d="M 350 118 L 404 118" fill="none" stroke="#93a3b5" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arr)"/>

  <g filter="url(#lift)"><rect x="414" y="66" width="300" height="104" rx="14" fill="url(#okChipG)" stroke="#cdddec" stroke-width="1.5"/></g>
  <text x="564" y="98" text-anchor="middle" font-size="13.5" font-weight="700" fill="#31405a">An ice shell, tens of km</text>
  <text x="564" y="118" text-anchor="middle" font-size="13.5" font-weight="700" fill="#31405a">thick, shields the ocean</text>
  <text x="564" y="140" text-anchor="middle" font-size="11.5" fill="#5a6880">below instead. The ocean</text>
  <text x="564" y="156" text-anchor="middle" font-size="11.5" fill="#5a6880">never sees space.</text>

  <g><rect x="738" y="94" width="96" height="26" rx="13" fill="#2f6f9f"/><text x="786" y="111.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff" letter-spacing="1">REFRAMED</text></g>

  <!-- Row 2 -->
  <g filter="url(#lift)"><rect x="46" y="196" width="300" height="104" rx="14" fill="url(#paneG)" stroke="#dde3ec" stroke-width="1.5"/></g>
  <text x="196" y="240" text-anchor="middle" font-size="14.5" font-weight="700" fill="#12203a">Sunlight</text>
  <text x="196" y="264" text-anchor="middle" font-size="11.5" fill="#5a6880">to power a food chain</text>

  <path d="M 350 248 L 404 248" fill="none" stroke="#93a3b5" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arr)"/>

  <g filter="url(#lift)"><rect x="414" y="196" width="300" height="104" rx="14" fill="url(#okChipG)" stroke="#cdddec" stroke-width="1.5"/></g>
  <text x="564" y="228" text-anchor="middle" font-size="13.5" font-weight="700" fill="#31405a">Chemosynthesis at</text>
  <text x="564" y="248" text-anchor="middle" font-size="13.5" font-weight="700" fill="#31405a">hydrothermal vents instead</text>
  <text x="564" y="270" text-anchor="middle" font-size="11.5" fill="#5a6880">Already runs complex animal life</text>
  <text x="564" y="286" text-anchor="middle" font-size="11.5" fill="#5a6880">on Earth's own ocean floor, in the dark.</text>

  <g><rect x="738" y="224" width="96" height="26" rx="13" fill="#2f6f9f"/><text x="786" y="241.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff" letter-spacing="1">REFRAMED</text></g>

  <!-- Row 3 -->
  <g filter="url(#lift)"><rect x="46" y="326" width="300" height="104" rx="14" fill="url(#paneG)" stroke="#dde3ec" stroke-width="1.5"/></g>
  <text x="196" y="364" text-anchor="middle" font-size="14.5" font-weight="700" fill="#12203a">Enough time for</text>
  <text x="196" y="386" text-anchor="middle" font-size="14.5" font-weight="700" fill="#12203a">chemistry to become biology</text>
  <text x="196" y="408" text-anchor="middle" font-size="11.5" fill="#5a6880">the way it did on Earth</text>

  <path d="M 350 378 L 404 378" fill="none" stroke="#93a3b5" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arr)"/>

  <g filter="url(#lift)"><rect x="414" y="326" width="300" height="104" rx="14" fill="url(#openChipG)" stroke="#c2603f" stroke-width="2"/></g>
  <text x="564" y="356" text-anchor="middle" font-size="13.5" font-weight="700" fill="#31405a">Ocean age estimates run</text>
  <text x="564" y="376" text-anchor="middle" font-size="13.5" font-weight="700" fill="#31405a">100 million to 1+ billion years</text>
  <text x="564" y="398" text-anchor="middle" font-size="11.5" fill="#5a6880">Three studies disagree by roughly</text>
  <text x="564" y="414" text-anchor="middle" font-size="11.5" fill="#5a6880">a factor of ten. Not yet settled.</text>

  <g><rect x="726" y="354" width="108" height="26" rx="13" fill="#c2603f"/><text x="780" y="371.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff" letter-spacing="0.5">OPEN QUESTION</text></g>

  <!-- Takeaway -->
  <g filter="url(#lift)"><rect x="100" y="470" width="680" height="90" rx="16" fill="url(#openChipG)" stroke="#c2603f" stroke-width="2"/></g>
  <text x="440" y="506" text-anchor="middle" font-size="16" font-weight="700" fill="#12203a">Two questions get answered by changing the mechanism.</text>
  <text x="440" y="530" text-anchor="middle" font-size="16" font-weight="700" fill="#12203a">The third depends on a number nobody agrees on yet.</text>

  <text x="440" y="596" text-anchor="middle" font-size="12" fill="#5a6880">Earth's own timeline is the only one we have, and it isn't a short one.</text>
</svg>
