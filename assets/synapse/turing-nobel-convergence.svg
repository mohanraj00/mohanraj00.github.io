<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Two Turing-and-Nobel laureates, two rival paradigms, one shared claim</title>
  <desc id="d">Two cards. On the left, Herbert Simon: Turing Award 1975 and Nobel Prize in Economics 1978, standard-bearer of symbolic AI and bounded rationality. On the right, Geoffrey Hinton: Turing Award 2018 and Nobel Prize in Physics 2024, standard-bearer of connectionism and the Boltzmann machine. The two paradigms are usually treated as rivals. Arrows from both cards converge on a single highlighted box at the bottom reading: Intelligence is search under limits. A caption notes they differ only on what the search space is made of, discrete symbols or continuous weights.</desc>

  <defs>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f6fa"/>
    </linearGradient>
    <linearGradient id="paneG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f9fc"/>
    </linearGradient>
    <linearGradient id="claimG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf1ec"/>
      <stop offset="1" stop-color="#fbe6dd"/>
    </linearGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1a2740" flood-opacity="0.10"/>
    </filter>
    <filter id="lift2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#20344f" flood-opacity="0.13"/>
    </filter>
    <marker id="cv" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#c2603f"/></marker>
  </defs>

  <rect x="10" y="10" width="860" height="460" rx="20" fill="url(#cardG)" stroke="#e4e9f1" stroke-width="1.5" filter="url(#soft2)"/>

  <!-- LEFT: Simon -->
  <g filter="url(#lift2)">
    <rect x="46" y="44" width="336" height="168" rx="14" fill="url(#paneG)" stroke="#dde3ec" stroke-width="1.5"/>
  </g>
  <text x="214" y="82" text-anchor="middle" font-size="19" font-weight="700" fill="#12203a">Herbert Simon</text>
  <g transform="translate(214,104)" text-anchor="middle" font-size="11.5" fill="#5a6880">
    <text x="-58" y="0">Turing Award 1975</text>
    <text x="58" y="0">Nobel 1978</text>
  </g>
  <line x1="78" y1="124" x2="350" y2="124" stroke="#eaeef4" stroke-width="1.5"/>
  <text x="214" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2f6f9f" letter-spacing="0.5">Symbolic AI</text>
  <text x="214" y="174" text-anchor="middle" font-size="12" fill="#5a6880">rules over symbols;</text>
  <text x="214" y="192" text-anchor="middle" font-size="12" fill="#5a6880">bounded rationality, satisficing</text>

  <!-- RIGHT: Hinton -->
  <g filter="url(#lift2)">
    <rect x="498" y="44" width="336" height="168" rx="14" fill="url(#paneG)" stroke="#dde3ec" stroke-width="1.5"/>
  </g>
  <text x="666" y="82" text-anchor="middle" font-size="19" font-weight="700" fill="#12203a">Geoffrey Hinton</text>
  <g transform="translate(666,104)" text-anchor="middle" font-size="11.5" fill="#5a6880">
    <text x="-58" y="0">Turing Award 2018</text>
    <text x="58" y="0">Nobel 2024</text>
  </g>
  <line x1="530" y1="124" x2="802" y2="124" stroke="#eaeef4" stroke-width="1.5"/>
  <text x="666" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2f6f9f" letter-spacing="0.5">Connectionism</text>
  <text x="666" y="174" text-anchor="middle" font-size="12" fill="#5a6880">learned weights;</text>
  <text x="666" y="192" text-anchor="middle" font-size="12" fill="#5a6880">Hopfield net, Boltzmann machine</text>

  <text x="440" y="250" text-anchor="middle" font-size="12" fill="#93a3b5" font-style="italic">usually told as a paradigm war...</text>

  <!-- converging arrows -->
  <path d="M 214 214 C 214 288, 356 286, 404 320" fill="none" stroke="#c2603f" stroke-width="2.5" stroke-linecap="round" marker-end="url(#cv)"/>
  <path d="M 666 214 C 666 288, 524 286, 476 320" fill="none" stroke="#c2603f" stroke-width="2.5" stroke-linecap="round" marker-end="url(#cv)"/>

  <!-- shared claim -->
  <g filter="url(#lift2)">
    <rect x="252" y="338" width="376" height="86" rx="16" fill="url(#claimG)" stroke="#c2603f" stroke-width="2"/>
  </g>
  <text x="440" y="374" text-anchor="middle" font-size="18" font-weight="700" fill="#12203a">Intelligence is search</text>
  <text x="440" y="399" text-anchor="middle" font-size="18" font-weight="700" fill="#12203a">under limits</text>

  <text x="440" y="452" text-anchor="middle" font-size="12" fill="#5a6880">They differ only on what the search space is made of: discrete symbols, or continuous weights.</text>
</svg>
