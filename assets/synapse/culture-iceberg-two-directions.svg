<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-labelledby="t d">
  <title id="t">One culture iceberg, two opposite directions of concern</title>
  <desc id="d">A single iceberg labelled Culture sits in water. Its visible tip above the waterline is labelled traditions, language, and artifacts; the much larger mass below is labelled assumptions, beliefs, and thought processes, about ninety percent. On the left, Anthropology reads the iceberg with an arrow curving back toward the observer, labelled correct the observer, cultural relativism. On the right, Marketing reads the same iceberg with an arrow pointing outward to the observed, labelled reach the observed, segment and sell. Same diagram, opposite direction of concern.</desc>

  <rect x="0" y="0" width="800" height="400" rx="14" fill="#f7f8fa"/>

  <!-- water -->
  <rect x="16" y="150" width="768" height="234" rx="0" fill="#e7edf3"/>
  <line x1="16" y1="150" x2="784" y2="150" stroke="#9fb2c4" stroke-width="1.5"/>
  <text x="30" y="145" font-size="10.5" fill="#8a93a2" font-style="italic">waterline</text>

  <!-- iceberg -->
  <polygon points="400,66 452,150 348,150" fill="#ffffff" stroke="#8a93a2" stroke-width="2"/>
  <polygon points="348,150 452,150 486,300 314,300" fill="#dfe8f0" stroke="#9fb2c4" stroke-width="1.5"/>
  <text x="400" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#1a2433">CULTURE</text>
  <text x="400" y="210" text-anchor="middle" font-size="11.5" fill="#5b6472">assumptions,</text>
  <text x="400" y="227" text-anchor="middle" font-size="11.5" fill="#5b6472">beliefs, thought</text>
  <text x="400" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4552">the ~90%</text>

  <g font-size="10.5" fill="#8a93a2">
    <text x="400" y="330" text-anchor="middle" font-style="italic">tip: traditions, language, artifacts</text>
  </g>

  <!-- left: anthropology -->
  <text x="150" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#1a2433">ANTHROPOLOGY</text>
  <text x="150" y="90" text-anchor="middle" font-size="12" fill="#5b6472">correct the observer</text>
  <path d="M 300 130 C 250 130, 210 128, 176 118" fill="none" stroke="#c0563a" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="150" y="150" text-anchor="middle" font-size="11" fill="#c0563a" font-style="italic">cultural relativism</text>
  <text x="150" y="176" text-anchor="middle" font-size="11" fill="#8a93a2">the concept turns</text>
  <text x="150" y="191" text-anchor="middle" font-size="11" fill="#8a93a2">back on you</text>

  <!-- right: marketing -->
  <text x="650" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#1a2433">MARKETING</text>
  <text x="650" y="90" text-anchor="middle" font-size="12" fill="#5b6472">reach the observed</text>
  <path d="M 500 130 C 550 130, 590 128, 624 118" fill="none" stroke="#c0563a" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="650" y="150" text-anchor="middle" font-size="11" fill="#c0563a" font-style="italic">segment and sell</text>
  <text x="650" y="176" text-anchor="middle" font-size="11" fill="#8a93a2">the concept points</text>
  <text x="650" y="191" text-anchor="middle" font-size="11" fill="#8a93a2">out at them</text>

  <text x="400" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4552">Same diagram. Opposite direction of concern.</text>

  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c0563a"/>
    </marker>
  </defs>
</svg>
