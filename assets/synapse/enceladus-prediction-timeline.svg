<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Timeline: a prediction about the origin of life, then two confirmations</title>
  <desc id="d">A horizontal timeline with four marked events. 1993: Michael Russell predicts life began at alkaline hydrothermal vents; no such vent had been found. 2000, seven years later: the Lost City vent field is discovered in the mid-Atlantic, matching the prediction. 2015 and 2017: Cassini flies through the plume of Saturn's moon Enceladus and detects silica requiring water hotter than 90 degrees Celsius, then molecular hydrogen. 2023: hydrogen cyanide is identified in archived plume data. The first two events are on Earth; the last two are at Saturn.</desc>

  <defs>
    <linearGradient id="cardT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f6fa"/>
    </linearGradient>
    <linearGradient id="lineT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4ccd7"/>
      <stop offset="0.5" stop-color="#9db6cf"/>
      <stop offset="1" stop-color="#6fa0c7"/>
    </linearGradient>
    <filter id="softT" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1a2740" flood-opacity="0.10"/>
    </filter>
    <filter id="dotT" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1c3b57" flood-opacity="0.30"/>
    </filter>
    <clipPath id="clipT"><rect x="10" y="10" width="840" height="280" rx="18"/></clipPath>
  </defs>

  <rect x="10" y="10" width="840" height="280" rx="18" fill="url(#cardT)" stroke="#e4e9f1" stroke-width="1.5" filter="url(#softT)"/>
  <g clip-path="url(#clipT)">
    <rect x="10" y="10" width="420" height="280" fill="#f6f4f0" opacity="0.55"/>
    <rect x="430" y="10" width="420" height="280" fill="#eaf1f8" opacity="0.6"/>
  </g>

  <!-- descriptors -->
  <g font-size="11.5" fill="#6a798d">
    <text x="140" y="48" text-anchor="middle">Life began at</text>
    <text x="140" y="64" text-anchor="middle">alkaline sea vents</text>
    <text x="330" y="48" text-anchor="middle">Lost City vent field,</text>
    <text x="330" y="64" text-anchor="middle">mid-Atlantic</text>
    <text x="530" y="48" text-anchor="middle">Hot-water silica, then</text>
    <text x="530" y="64" text-anchor="middle">hydrogen in the plume</text>
    <text x="720" y="48" text-anchor="middle">Hydrogen cyanide</text>
    <text x="720" y="64" text-anchor="middle">in archived data</text>
  </g>

  <!-- category labels -->
  <g fill="#12203a" font-size="13.5" font-weight="700">
    <text x="140" y="92" text-anchor="middle">The prediction</text>
    <text x="330" y="92" text-anchor="middle">Found on Earth</text>
    <text x="530" y="92" text-anchor="middle">Found at Saturn</text>
    <text x="720" y="92" text-anchor="middle">A building block</text>
  </g>

  <!-- divider Earth | Saturn -->
  <line x1="430" y1="104" x2="430" y2="214" stroke="#c3cdd9" stroke-width="1.25" stroke-dasharray="3 4"/>

  <!-- timeline -->
  <line x1="140" y1="150" x2="720" y2="150" stroke="url(#lineT)" stroke-width="3" stroke-linecap="round"/>

  <!-- 7 years bracket -->
  <text x="235" y="138" text-anchor="middle" font-size="11" fill="#93a3b5">7 years</text>

  <!-- nodes -->
  <circle cx="140" cy="150" r="9.5" fill="#ffffff" stroke="#7f93a8" stroke-width="2.75"/>
  <g filter="url(#dotT)">
    <circle cx="330" cy="150" r="9.5" fill="#2f6f9f"/>
    <circle cx="530" cy="150" r="9.5" fill="#2f6f9f"/>
    <circle cx="720" cy="150" r="9.5" fill="#2f6f9f"/>
  </g>

  <!-- years -->
  <g fill="#4d5b70" font-size="13" font-weight="600">
    <text x="140" y="182" text-anchor="middle">1993</text>
    <text x="330" y="182" text-anchor="middle">2000</text>
    <text x="530" y="182" text-anchor="middle">2015 · 2017</text>
    <text x="720" y="182" text-anchor="middle">2023</text>
  </g>

  <text x="140" y="204" text-anchor="middle" font-size="11" fill="#a2adbc" font-style="italic">no vent found yet</text>

  <!-- zone labels -->
  <text x="235" y="258" text-anchor="middle" font-size="12" fill="#8a7a5f" font-style="italic">on Earth</text>
  <text x="625" y="258" text-anchor="middle" font-size="12" fill="#5a7896" font-style="italic">on a moon of Saturn</text>
</svg>
