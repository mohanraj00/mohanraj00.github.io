title: Mohan Raj
description: "Solo builder. Engineering writeups on architecture, technology, and how teams (human or agent) are organized to build; plus Midweek Synapse, syntheses from my second-brain wiki."
url: "https://mohanraj00.github.io"
remote_theme: mmistakes/jekyll-theme-basically-basic

collections:
  tech:
    output: true
    permalink: /tech/:title/
  synapse:
    output: true
    permalink: /synapse/:title/

defaults:
  - scope:
      type: tech
    values:
      layout: post
  - scope:
      type: synapse
    values:
      layout: synapse

plugins:
  - jekyll-feed
  - jekyll-remote-theme

feed:
  collections:
    - tech
    - synapse

# Basically Basic reads nav from _data/navigation.yml; header_pages kept harmlessly for minima fallback
header_pages:
  - tech/index.md
  - synapse/index.md
