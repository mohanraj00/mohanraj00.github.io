<button type="button" class="synapse-theme-toggle" role="switch" aria-label="Switch between light and dark theme" title="Light / dark">
  <span class="tt-knob">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
  </span>
</button>

<script>
  /* Wire the toggle: reflect the effective theme, flip + remember on click,
     and follow the device when the reader hasn't overridden. */
  (function () {
    var btn = document.querySelector('.synapse-theme-toggle');
    if (!btn) return;
    var mql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
    function effective() {
      var forced = document.documentElement.getAttribute('data-theme');
      if (forced === 'dark' || forced === 'light') return forced;
      return mql && mql.matches ? 'dark' : 'light';
    }
    function sync() {
      var mode = effective();
      btn.setAttribute('data-mode', mode);
      btn.setAttribute('aria-checked', mode === 'dark' ? 'true' : 'false');
    }
    sync();
    btn.addEventListener('click', function () {
      var next = effective() === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('synapse-theme', next); } catch (e) {}
      sync();
    });
    if (mql) {
      mql.addEventListener('change', function () {
        var saved = null;
        try { saved = localStorage.getItem('synapse-theme'); } catch (e) {}
        if (saved !== 'dark' && saved !== 'light') sync();
      });
    }
  })();
</script>
